META_ARC: "siamban_r50_l234"

CUDA: True

TRAIN:
  PRETRAINED: ''
  LOG_DIR: './logs'
  SNAPSHOT_DIR: './snapshot'
  EPOCH: 20
  START_EPOCH: 0
  BATCH_SIZE: 8
  NUM_WORKERS: 4
  MOMENTUM: 0.9
  WEIGHT_DECAY: 0.0001
  CLS_WEIGHT: 1.0
  LOC_WEIGHT: 1.0
  PRINT_FREQ: 20
  LOG_GRADS: False
  GRAD_CLIP: 10.0
  BASE_LR: 0.005
  NEG_NUM: 16
  POS_NUM: 16
  TOTAL_NUM: 64
  EXEMPLAR_SIZE: 127
  SEARCH_SIZE: 255
  BASE_SIZE: 8
  OUTPUT_SIZE: 25
  RESUME: ''
  LR:
    TYPE: log
    KWARGS:
      start_lr: 0.005
      end_lr: 0.00005
  LR_WARMUP:
    WARMUP: True
    TYPE: step
    EPOCH: 5
    KWARGS:
      start_lr: 0.001
      end_lr: 0.005
      step: 1

DATASET:
  NAMES:
    - VID
  TEMPLATE:
    SHIFT: 12
    SCALE: 0.15
    BLUR: 0.4
    FLIP: 0.4
    COLOR: 1.2
  SEARCH:
    SHIFT: 128
    SCALE: 0.3
    BLUR: 0.3
    FLIP: 0.4
    COLOR: 1.2
  NEG: 0.2
  GRAY: 0.0
  VIDEOS_PER_EPOCH: 10000
  VID:
    ROOT: '/kaggle/working/crops'
    ANNO: '/kaggle/working/train.json'
    FRAME_RANGE: 100
    NUM_USE: -1

BACKBONE:
  TYPE: resnet50
  KWARGS:
    used_layers: [2, 3, 4]
  PRETRAINED: 'pretrained_models/resnet50.model'
  TRAIN_LAYERS: ['layer2', 'layer3', 'layer4']
  LAYERS_LR: 0.1
  TRAIN_EPOCH: 10

ADJUST:
  ADJUST: True
  TYPE: AdjustAllLayer
  KWARGS:
    in_channels: [512, 1024, 2048]
    out_channels: [256, 256, 256]

BAN:
  BAN: True
  TYPE: MultiBAN
  KWARGS:
    in_channels: [256, 256, 256]
    cls_out_channels: 2
    weighted: True

POINT:
  STRIDE: 8

TRACK:
  TYPE: SiamBANTracker
  PENALTY_K: 0.08513642556896711
  WINDOW_INFLUENCE: 0.4632532824922313
  LR: 0.44418184746462425
  EXEMPLAR_SIZE: 127
  INSTANCE_SIZE: 255
  BASE_SIZE: 8
  CONTEXT_AMOUNT: 0.5
